version: '3.9'

services:

  postgres:
    image: postgres:15-alpine
    container_name: velis_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: velis_user
      POSTGRES_PASSWORD: velis_password
      POSTGRES_DB: velis_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velis_user -d velis_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: velis_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: velis_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://velis_user:velis_password@postgres:5432/velis_db
      - REDIS_URL=redis://redis:6379
    env_file:
      - ../.env
    volumes:
      - ../backend:/app
      - uploads_data:/app/uploads
      - audio_data:/app/audio
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  uploads_data:
  audio_data:
