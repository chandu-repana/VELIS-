services:

  postgres:
    image: postgres:15-alpine
    container_name: velis_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: velis_user
      POSTGRES_PASSWORD: velis_password
      POSTGRES_DB: velis_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velis_user -d velis_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: velis_redis_prod
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: velis_backend_prod
    restart: always
    environment:
      - DATABASE_URL=postgresql://velis_user:velis_password@postgres:5432/velis_db
      - REDIS_URL=redis://redis:6379
      - APP_ENV=production
      - DEBUG=False
    env_file:
      - ../.env.production
    volumes:
      - uploads_data:/app/uploads
      - audio_data:/app/audio
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]

  nginx:
    image: nginx:alpine
    container_name: velis_nginx_prod
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_build:/usr/share/nginx/html:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
  audio_data:
  frontend_build:
